<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FunFan - ログイン</title>
    <link rel="stylesheet" href="common-styles.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Hiragino Sans', 'Hiragino Sans W3', 'Roboto', sans-serif;
            background: #ffffff;
            color: #1a68fe;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 0;
        }

        .container {
            width: 100%;
            max-width: 390px;
            padding: 0;
        }

        .form-wrapper {
            background: #ffffff;
            padding: 0;
            margin: 0;
        }

        .logo {
            position: fixed;
            top: 20px;
            left: 24px;
            width: 92px;
            height: 26px;
            z-index: 1000;
        }

        .logo {
            cursor: pointer;
        }

        .logo a {
            display: block;
            width: 100%;
            height: 100%;
        }

        .form-title {
            text-align: center;
            color: #1a68fe;
            margin-bottom: 38px;
        }

        .form-title.hero {
            font-size: 44px;
            font-weight: 400;
            font-family: 'Rampart One', sans-serif;
            line-height: 64px;
            letter-spacing: -0.06em;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-divider {
            height: 1px;
            background-color: #1a68fe;
            margin: 19px 0;
        }

        .form-label {
            display: flex;
            align-items: center;
            font-size: 12px;
            font-weight: 600;
            font-family: 'Hiragino Sans', 'Hiragino Sans W6', 'Roboto', sans-serif;
            color: #1a68fe;
            margin-bottom: 8px;
            gap: 6px;
            line-height: 18px;
        }

        .lock-icon {
            width: 16px;
            height: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #1a68fe;
            font-size: 14px;
        }

        .invitation-code-group {
            display: grid;
            grid-template-columns: repeat(9, 1fr);
            gap: 6px;
            margin-bottom: 6px;
        }

        .invitation-input {
            width: 100%;
            height: 48px;
            border: none;
            outline: 1px solid #1a68fe;
            outline-offset: -1px;
            border-radius: 12px;
            text-align: center;
            font-size: 16px;
            font-weight: 600;
            color: #1a68fe;
            background: #ffffff;
            cursor: text;
            padding: 0;
        }

        .invitation-input:hover {
            outline: 2px solid #1a68fe;
            outline-offset: -2px;
        }

        .invitation-input:focus {
            outline: 2px solid #1a68fe;
            outline-offset: -2px;
            background: #ffffff;
            color: #1a68fe;
            box-shadow: 3px 3px 0px 0px rgba(26, 104, 254, 1);
        }

        .form-hint {
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 20px;
            font-size: 12px;
            font-weight: 300;
            font-family: 'Hiragino Sans', 'Hiragino Sans W3', 'Roboto', sans-serif;
            color: #1a68fe;
            line-height: 18px;
        }

        .validation-icon {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background-color: #22c55e;
            color: #ffffff;
            font-size: 14px;
            font-weight: bold;
            margin-left: 8px;
            flex-shrink: 0;
            align-items: center;
            justify-content: center;
            line-height: 2;
            display: none;
        }

        .validation-icon.show {
            display: flex;
        }

        .text-input {
            width: 100%;
            height: 42px;
            padding: 12px 14px;
            border: none;
            outline: 1px solid #1a68fe;
            outline-offset: -1px;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 600;
            font-family: 'Hiragino Sans', 'Hiragino Sans W6', 'Roboto', sans-serif;
            color: #1a68fe;
            background: #ffffff;
            line-height: 22px;
        }

        .text-input::placeholder {
            color: #1a68fe;
            font-weight: 300;
            opacity: 0.6;
        }

        .text-input:hover {
            outline: 2px solid #1a68fe;
            outline-offset: -2px;
        }

        .text-input:focus {
            outline: 2px solid #1a68fe;
            outline-offset: -2px;
            background: #ffffff;
            color: #1a68fe;
            font-weight: 600;
            box-shadow: 3px 3px 0px 0px rgba(26, 104, 254, 1);
        }

        .text-input:-webkit-autofill,
        .text-input:-webkit-autofill:hover,
        .text-input:-webkit-autofill:focus {
            -webkit-text-fill-color: #1a68fe !important;
            -webkit-box-shadow: 0 0 0px 1000px #ffffff inset !important;
        }

        .button-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-top: 46px;
            margin-bottom: 46px;
        }

        .footer {
            text-align: center;
            color: #1a68fe;
            font-size: 12px;
            font-weight: 300;
            font-family: 'Hiragino Sans', 'Hiragino Sans W3', 'Roboto', sans-serif;
            margin-bottom: 46px;
            line-height: 18px;
        }

        @media (max-width: 480px) {
            .form-title {
                font-size: 28px;
                margin-bottom: 40px;
            }

            .invitation-code-group {
                gap: 8px;
            }

            .btn {
                padding: 12px 20px;
                font-size: 14px;
            }
        }
    </style>
</head>
<body>
    <a href="signup.html">
        <img src="logo_funfan.svg" alt="FunFan Logo" class="logo">
    </a>
    <div class="container">
        <form class="form-wrapper" id="loginForm">
            <h1 class="form-title hero">ログイン</h1>

            <!-- メールアドレス -->
            <div class="form-group">
                <label class="form-label caption-w6">
                    メールアドレス
                </label>
                <input type="email" class="text-input sub-text-w6" placeholder="your@email.com" required>
            </div>

            <!-- パスワード -->
            <div class="form-group">
                <label class="form-label caption-w6">
                    パスワード
                </label>
                <input type="password" class="text-input sub-text-w6" placeholder="パスワード (8～12、英字+数字)" required>
            </div>

            <!-- ボタン -->
            <div class="button-group">
                <button type="submit" class="btn button-cta-md-primary sub-text-w6">ログイン</button>
                <button type="button" class="btn button-cta-md-secondary sub-text-w6 btn-signup">アカウント登録</button>
            </div>

            <div class="footer caption">NHN comico Corp.</div>
        </form>
    </div>

    <script>
        // ページ加載時に最初のメールアドレス入力にフォーカス
        window.addEventListener('load', () => {
            // すべての入力フィールドを初期化
            document.querySelectorAll('input').forEach(input => {
                input.value = '';
            });

            const emailInput = document.querySelector('.text-input');
            if (emailInput) {
                emailInput.focus();
            }
        });

        // ログインフォーム送信
        document.getElementById('loginForm').addEventListener('submit', (e) => {
            e.preventDefault();

            const textInputs = document.querySelectorAll('.text-input');
            const emailInput = textInputs[0].value.trim();
            const passwordInput = textInputs[1].value.trim();

            // 入力値の検証
            if (!emailInput) {
                alert('メールアドレスを入力してください');
                return;
            }

            if (!passwordInput) {
                alert('パスワードを入力してください');
                return;
            }

            // すべての検証に合格したらプロフィールページへ移動
            window.location.href = 'profile.html';
        });

        // アカウント登録ボタン
        document.querySelector('.btn-signup').addEventListener('click', () => {
            window.location.href = 'signup.html';
        });
    </script>
</body>
</html>
